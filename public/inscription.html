<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - GCB News</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff9500, #ffb347, #ffd700);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 100%;
            max-width: 900px;
            display: flex;
            min-height: 600px;
        }

        .welcome-section {
            background: linear-gradient(135deg, #ff8c00, #ffa500);
            color: white;
            padding: 40px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-radius: 20px;
        }

        .logo-container {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            border: 3px solid rgba(255, 255, 255, 0.3);
        }

        .image {
            font-size: 24px;
            font-weight: bold;
            color: white;
            border-radius: 20px;
            position: relative;
        }

        .welcome-section h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            font-weight: 300;
        }

        .welcome-section p {
            font-size: 1.1rem;
            opacity: 0.9;
            line-height: 1.6;
        }

        .form-section {
            padding: 40px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            
        }

        .form-title {
            color: #333;
            font-size: 2rem;
            margin-bottom: 30px;
            text-align: center;
            font-weight: 300;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f9f9f9;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #ff8c00;
            background: white;
            box-shadow: 0 0 0 3px rgba(255, 140, 0, 0.1);
        }

        .submit-btn {
            background: linear-gradient(135deg, #ff8c00, #ffa500);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 20px;
        }

        .submit-btn:hover {
            background: linear-gradient(135deg, #e67e00, #ff9500);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 140, 0, 0.3);
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .login-link a {
            color: #ff8c00;
            text-decoration: none;
            font-weight: 500;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 15px;
            font-size: 14px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                max-width: 500px;
            }

            .welcome-section {
                border-radius: 10px 40px;
                padding: 30px 20px;
            }

            .welcome-section h1 {
                font-size: 2rem;
            }

            .form-section {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
       <!-- Phase 1: Section de bienvenue -->
        <div class="welcome-section">
            <div class="logo-container">
                <div class="image"><img src="gcb.png" width="90px" height="95px"></div>
            </div>
            <h1>Bienvenue au GCB News</h1>
            <p>Rejoignez notre communauté et restez informé des dernières actualités. Créez votre compte pour accéder à toutes nos fonctionnalités.</p>
        </div>

        <!-- Phase 2: Formulaire de connexion -->
        <div class="form-section">
            <h2 class="form-title">Inscription</h2>
            <form id="inscriptionForm">
                <div class="form-group">
                    <label for="Nom">Nom complet</label>
                    <input type="text" id="Nom" name="Nom" required>
                </div>

                <div class="form-group">
                    <label for="email">Adresse email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="Mot_de_passe">Mot de passe</label>
                    <input type="password" id="Mot_de_passe" name="Mot_de_passe" required>
                </div>

                <!-- Rôle par défaut -->
                <input type="hidden" id="role" value="user">

                <button type="submit" class="submit-btn">S'inscrire</button>
            </form>
            <div class="login-link">
                <p>Déjà un compte ? <a href="index.html">Se connecter</a></p>
            </div>
        </div>
    </div>

    <script src="inscription.js"></script>
</body>
</html>
